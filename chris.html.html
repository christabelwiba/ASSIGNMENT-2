<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Contact Us</title>
        <link rel="stylesheet" href="assets/css/chris.css.css">
    </head>
    <body>
        <div class="form-container">
            <h2>Contact Us</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="first name">First Name</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email-address" name="email-address" required>
                </div>
                <div class="form-group">
                    <labe for="query-type">Query Type</labe>
                    <select id="query type" name="query-type">
                        <option value="general">General Enquiry</option>
                        <option value="support">Support Request</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="consent" name="consent" required>
                    <label for="consent">I consent to being contacted by the team</label>
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
    </body>
    </head>
</html>
